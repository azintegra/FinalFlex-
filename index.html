<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Gate Codes</title>

  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gate Codes" />
  <meta name="description" content="Fast gate code lookup" />

  <link rel="manifest" href="./manifest.json?v=6" />

  <style>
    :root{
      --bg:#0f1115;
      --panel:#171a22;
      --panel-2:#1c2230;
      --line:#282f3b;
      --text:#f8fafc;
      --muted:#98a2b3;
      --blue:#2563eb;
      --green:#10b981;
      --shadow:0 14px 36px rgba(0,0,0,.28);
      --radius:18px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    body{min-height:100vh;padding-bottom:40px}
    a{color:inherit;text-decoration:none}
    .app{width:100%;max-width:920px;margin:0 auto}
    header{position:sticky;top:0;z-index:50;background:rgba(15,17,21,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top,0px) + 14px) 14px 12px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    h1{font-size:22px;font-weight:750;letter-spacing:-.02em}
    .header-actions{display:flex;gap:8px;align-items:center}
    .install-btn,.ghost-btn{display:none;border:none;border-radius:999px;background:var(--blue);color:white;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer}
    .ghost-btn{display:inline-flex;background:#171c27;border:1px solid var(--line);color:#c7d0db}
    .meta{font-size:12px;color:var(--muted);margin-bottom:12px;min-height:16px;line-height:1.35}
    .search-wrap{display:grid;gap:10px}
    .search-row{display:flex;gap:8px}
    .search{width:100%;border:none;outline:none;background:#181c25;color:white;border:1px solid var(--line);border-radius:14px;padding:14px 15px;font-size:16px}
    .search:focus{border-color:#3f67b5;box-shadow:0 0 0 3px rgba(37,99,235,.18)}
    .clear-btn{display:none;border:none;outline:none;border-radius:14px;background:#171c27;border:1px solid var(--line);color:#c7d0db;padding:0 14px;font-size:13px;font-weight:700;cursor:pointer}
    .clear-btn.show{display:inline-flex;align-items:center}
    .filters{display:flex;gap:8px;overflow:auto;padding-bottom:2px}
    .filters::-webkit-scrollbar{display:none}
    .filter{white-space:nowrap;border:none;border-radius:999px;background:#171c27;border:1px solid var(--line);color:#c7d0db;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer}
    .filter.active{background:var(--blue);color:white;border-color:var(--blue)}
    main{padding:14px}
    .stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .stat{background:#141822;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:8px 12px;font-size:12px}
    .recent{display:none;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:14px;box-shadow:var(--shadow)}
    .recent-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;font-weight:700}
    .recent-codes{display:flex;gap:8px;flex-wrap:wrap}
    .section{margin-top:18px}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .section-title{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:700}
    .section-count{color:var(--muted);font-size:12px}
    .card{background:linear-gradient(180deg,var(--panel) 0%, var(--panel-2) 100%);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
    .card-main{padding:14px}
    .community-name{font-size:18px;font-weight:750;line-height:1.2;letter-spacing:-.01em;margin-bottom:6px}
    .address{font-size:14px;line-height:1.35;color:#dde6f2;margin-bottom:12px}
    .address.missing{color:#cbd5e1;font-style:italic}
    .row-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .map-link{display:inline-flex;align-items:center;gap:6px;background:#171c27;border:1px solid #334155;border-radius:999px;padding:9px 12px;font-size:12px;font-weight:700;color:#dbeafe}
    .codes-label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:700;margin-bottom:8px}
    .codes{display:flex;gap:8px;flex-wrap:wrap}
    .code{border:none;cursor:pointer;border-radius:999px;padding:11px 14px;background:var(--blue);color:white;font-weight:800;font-size:15px;letter-spacing:.02em;min-width:74px;box-shadow:inset 0 -1px 0 rgba(255,255,255,.08);transition:transform .08s ease, background .12s ease}
    .code:active{transform:scale(.97)}
    .code.secondary{background:#20283a;border:1px solid #334155;color:#dbeafe}
    .code.copied{background:var(--green)}
    .no-code{display:inline-block;padding:9px 12px;border-radius:999px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);color:#fecaca;font-size:12px}
    .empty{margin-top:16px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:16px;padding:28px 16px;background:#131822}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(12px);opacity:0;pointer-events:none;background:#10151f;color:#fff;border:1px solid #2a3140;border-radius:999px;padding:11px 14px;font-size:13px;transition:opacity .18s ease, transform .18s ease;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media (min-width: 720px){h1{font-size:24px}.search{font-size:17px}.community-name{font-size:20px}.code{font-size:16px}}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topbar">
        <h1>Gate Codes</h1>
        <div class="header-actions">
          <button id="installBtn" class="install-btn">Install</button>
        </div>
      </div>

      <div id="buildInfo" class="meta">Loading…</div>

      <div class="search-wrap">
        <div class="search-row">
          <input id="search" class="search" type="search" placeholder="Search address, community, or code" autocomplete="off" enterkeyhint="search" />
          <button id="clearBtn" class="clear-btn" type="button">Clear</button>
        </div>

        <div class="filters">
          <button class="filter active" data-type="All">All</button>
          <button class="filter" data-type="Apartments">Apartments</button>
          <button class="filter" data-type="Residential">Residential</button>
          <button class="filter" data-type="Student Housing">Student Housing</button>
        </div>
      </div>
    </header>

    <main>
      <div id="stats" class="stats"></div>

      <section id="recent" class="recent">
        <div class="recent-title">Recent Codes</div>
        <div id="recentCodes" class="recent-codes"></div>
      </section>

      <div id="results"></div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const DATA_VERSION = 'v6';
    const DATA_FILE = `./data.cleaned.json?v=${DATA_VERSION}`;
    const CACHE_KEY = 'recentCodesV1';
    const TYPE_ORDER = ['Apartments', 'Residential', 'Student Housing'];

    const buildInfo = document.getElementById('buildInfo');
    const searchInput = document.getElementById('search');
    const clearBtn = document.getElementById('clearBtn');
    const resultsEl = document.getElementById('results');
    const statsEl = document.getElementById('stats');
    const recentWrap = document.getElementById('recent');
    const recentCodesEl = document.getElementById('recentCodes');
    const toastEl = document.getElementById('toast');
    const installBtn = document.getElementById('installBtn');

    let appData = { meta: {}, Apartments: {}, Residential: {}, 'Student Housing': {} };
    let searchIndex = [];
    let activeType = 'All';
    let deferredPrompt = null;
    let toastTimer = null;

    function setBuildInfo(text) { buildInfo.textContent = text; }
    function normalizeText(value) { return String(value ?? '').trim().replace(/\s+/g, ' '); }
    function extractCodes(raw) {
      const matches = String(raw ?? '').match(/\d+/g) || [];
      return [...new Set(matches)];
    }
    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function mapHref(address) {
      return `https://maps.apple.com/?q=${encodeURIComponent(address)}`;
    }
    function getRecentCodes() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch { return []; }
    }
    function setRecentCodes(codes) { localStorage.setItem(CACHE_KEY, JSON.stringify(codes)); }
    function addRecentCode(code) {
      const trimmed = String(code || '').trim();
      if (!trimmed) return;
      let recent = getRecentCodes().filter(item => item !== trimmed);
      recent.unshift(trimmed);
      recent = recent.slice(0, 8);
      setRecentCodes(recent);
      renderRecentCodes();
    }
    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1300);
    }
    async function copyCode(code, button) {
      try {
        await navigator.clipboard.writeText(code);
        addRecentCode(code);
        if (button) {
          button.classList.add('copied');
          setTimeout(() => button.classList.remove('copied'), 700);
        }
        showToast(`Copied ${code}`);
      } catch {
        showToast(code);
      }
    }
    function renderRecentCodes() {
      const recent = getRecentCodes();
      if (!recent.length) {
        recentWrap.style.display = 'none';
        recentCodesEl.innerHTML = '';
        return;
      }
      recentWrap.style.display = 'block';
      recentCodesEl.innerHTML = recent.map(code => `<button class="code secondary" data-copy="${escapeHtml(code)}">${escapeHtml(code)}</button>`).join('');
      bindCopyButtons();
    }
    function buildIndex() {
      const rows = [];
      for (const type of TYPE_ORDER) {
        const groups = appData[type] || {};
        for (const [community, entries] of Object.entries(groups)) {
          const entry = Array.isArray(entries) && entries.length ? entries[0] : null;
          if (!entry) continue;
          const codes = extractCodes(entry.gate);
          rows.push({
            type,
            community,
            entry,
            codes,
            search: [community, entry.address || '', entry.gate || '', ...codes].join(' ').toLowerCase()
          });
        }
      }
      searchIndex = rows;
    }
    function getFilteredRows() {
      const query = searchInput.value.toLowerCase().trim();
      const allowedTypes = activeType === 'All' ? TYPE_ORDER : [activeType];
      return searchIndex.filter(row => allowedTypes.includes(row.type) && (!query || row.search.includes(query)));
    }
    function renderStats(rows) {
      const communityCount = rows.length;
      const codeCount = rows.reduce((sum, row) => sum + row.codes.length, 0);
      const totalCount = searchIndex.length;
      statsEl.innerHTML = `
        <div class="stat">${communityCount} shown</div>
        <div class="stat">${codeCount} codes</div>
        <div class="stat">${totalCount} total communities</div>
      `;
    }
    function renderSection(type, rows) {
      if (!rows.length) return '';
      const cardsHtml = rows
        .sort((a, b) => a.community.localeCompare(b.community))
        .map(({ community, entry, codes }) => {
          const address = normalizeText(entry.address);
          const codesHtml = codes.length
            ? `<div class="codes">${codes.map(code => `<button class="code" data-copy="${escapeHtml(code)}">${escapeHtml(code)}</button>`).join('')}</div>`
            : `<div class="no-code">No code listed</div>`;
          const mapsHtml = address ? `<div class="row-actions"><a class="map-link" href="${mapHref(address)}" target="_blank" rel="noopener noreferrer">Open in Maps</a></div>` : '';
          return `
            <section class="card">
              <div class="card-main">
                <div class="community-name">${escapeHtml(community)}</div>
                <div class="address ${address ? '' : 'missing'}">${address ? escapeHtml(address) : 'Address not listed'}</div>
                ${mapsHtml}
                <div class="codes-label">Codes</div>
                ${codesHtml}
              </div>
            </section>
          `;
        }).join('');
      return `<section class="section"><div class="section-header"><div class="section-title">${escapeHtml(type)}</div><div class="section-count">${rows.length}</div></div>${cardsHtml}</section>`;
    }
    function render() {
      const rows = getFilteredRows();
      renderStats(rows);
      clearBtn.classList.toggle('show', Boolean(searchInput.value.trim()));
      const html = (activeType === 'All' ? TYPE_ORDER : [activeType])
        .map(type => renderSection(type, rows.filter(row => row.type === type)))
        .join('');
      resultsEl.innerHTML = html || `<div class="empty">No matching results</div>`;
      bindCopyButtons();
    }
    function bindCopyButtons() {
      document.querySelectorAll('[data-copy]').forEach(button => {
        button.onclick = () => copyCode(button.dataset.copy, button);
      });
    }
    async function loadData() {
      try {
        const response = await fetch(DATA_FILE, { cache: 'no-store' });
        if (!response.ok) throw new Error('Failed to load data');
        appData = await response.json();
        buildIndex();
        const generatedAt = appData.meta?.generated_at ? new Date(appData.meta.generated_at).toLocaleString() : 'Unknown';
        setBuildInfo(`Loaded ${searchIndex.length} communities • ${appData.meta?.cleaned_codes || 0} codes • Updated ${generatedAt}`);
        renderRecentCodes();
        render();
      } catch {
        setBuildInfo('Failed to load data.cleaned.json');
        resultsEl.innerHTML = `<div class="empty">Unable to load data</div>`;
      }
    }
    function bindFilters() {
      document.querySelectorAll('.filter').forEach(button => {
        button.addEventListener('click', () => {
          document.querySelectorAll('.filter').forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          activeType = button.dataset.type;
          render();
        });
      });
    }
    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js?v=6').catch(() => {});
        });
      }
    }
    function setupInstallPrompt() {
      window.addEventListener('beforeinstallprompt', event => {
        event.preventDefault();
        deferredPrompt = event;
        installBtn.style.display = 'inline-flex';
      });
      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBtn.style.display = 'none';
      });
      window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        installBtn.style.display = 'none';
        showToast('App installed');
      });
    }
    searchInput.addEventListener('input', render);
    clearBtn.addEventListener('click', () => { searchInput.value = ''; render(); searchInput.focus(); });
    bindFilters();
    setupInstallPrompt();
    registerServiceWorker();
    renderRecentCodes();
    loadData();
  </script>
</body>
</html>
